<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>タスク一覧</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 8px; vertical-align: top; }
        .done { text-decoration: line-through; color: gray; }
        .actions { display: flex; gap: .5rem; flex-wrap: wrap; }
        form { display: inline; }
    </style>
</head>
<body>
<h1>タスク一覧</h1>
<p><a th:href="@{/tasks/new}">+ 新規タスク作成</a></p>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>タイトル</th>
        <th>説明</th>
        <th>完了</th>
        <th>作成日</th>
        <th>操作</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(tasks)}">
        <td colspan="6">タスクはありません。</td>
    </tr>
    <tr th:each="task : ${tasks}">
        <td th:text="${task.id}"></td>
        <td th:classappend="${task.completed} ? 'done' : ''" th:text="${task.title}"></td>
        <td th:text="${task.description}"></td>
        <td th:text="${task.completed} ? '完了' : '未完了'"></td>
        <td th:text="${#temporals.format(task.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
        <td>
            <div class="actions">
                <a th:href="@{'/tasks/' + ${task.id} + '/edit'}">編集</a>
                <form th:action="@{'/tasks/' + ${task.id} + '/toggle'}" method="post">
                    <button type="submit" th:text="${task.completed} ? '未完了に戻す' : '完了にする'"></button>
                </form>
                <form th:action="@{'/tasks/' + ${task.id} + '/delete'}" method="post">
                    <button type="submit" onclick="return confirm('削除しますか?')">削除</button>
                </form>
            </div>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
